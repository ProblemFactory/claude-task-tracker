<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Tracker</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3;
  --text-dim: #8b949e; --accent: #58a6ff; --green: #3fb950; --yellow: #d29922;
  --red: #f85149; --purple: #bc8cff; --orange: #d18616;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font:13px/1.5 -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); }
a { color:var(--accent); text-decoration:none; }

.layout { display:flex; height:100vh; }
.sidebar { width:240px; min-width:200px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--surface); }
.main { flex:1; overflow-y:auto; padding:20px 28px; }

/* Sidebar */
.sidebar h1 { font-size:14px; padding:14px 16px 8px; color:var(--text); display:flex; align-items:center; gap:6px; }
.sidebar h1 span { font-size:16px; }
.stats { padding:4px 16px 12px; font-size:11px; color:var(--text-dim); border-bottom:1px solid var(--border); }

.filters { padding:12px 16px; }
.filters label { display:block; font-size:11px; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
.filter-group { margin-bottom:12px; }
.filter-pills { display:flex; flex-wrap:wrap; gap:4px; margin-top:4px; }
.pill { padding:2px 8px; border-radius:10px; font-size:11px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text-dim); transition:.15s; }
.pill:hover { border-color:var(--text-dim); }
.pill.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.pill .count { font-size:10px; opacity:.7; margin-left:2px; }

select { width:100%; padding:4px 8px; border-radius:4px; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:12px; }

.activity-list { flex:1; overflow-y:auto; padding:8px 0; border-top:1px solid var(--border); }
.activity-item { padding:5px 16px; font-size:11px; color:var(--text-dim); border-left:2px solid transparent; cursor:pointer; }
.activity-item:hover { background:rgba(88,166,255,.06); }
.activity-item .role { font-size:10px; padding:0 4px; border-radius:3px; margin-right:4px; }
.role-created { background:rgba(63,185,80,.15); color:var(--green); }
.role-progressed { background:rgba(88,166,255,.15); color:var(--accent); }
.role-completed { background:rgba(188,140,255,.15); color:var(--purple); }
.activity-item .time { font-size:10px; color:var(--text-dim); opacity:.6; }

/* Main */
.task-grid { display:flex; flex-direction:column; gap:6px; }
.task-card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:10px 14px; display:flex; align-items:flex-start; gap:10px; transition:.15s; cursor:default; }
.task-card:hover { border-color:var(--text-dim); }

.task-status { width:10px; height:10px; border-radius:50%; margin-top:4px; flex-shrink:0; }
.status-open { background:var(--accent); }
.status-in_progress { background:var(--yellow); animation:pulse 2s infinite; }
.status-done { background:var(--green); }
.status-blocked { background:var(--red); }

@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

.task-body { flex:1; min-width:0; }
.task-title { font-size:13px; font-weight:600; }
.task-meta { display:flex; gap:8px; margin-top:3px; font-size:11px; color:var(--text-dim); flex-wrap:wrap; align-items:center; }
.tag { background:rgba(88,166,255,.12); color:var(--accent); padding:0 6px; border-radius:3px; font-size:10px; cursor:pointer; }
.tag:hover { background:rgba(88,166,255,.25); }
.priority-high { color:var(--red); }
.priority-low { color:var(--text-dim); opacity:.6; }
.origin-agent { opacity:.6; border-style:dashed; }
.origin-badge { font-size:9px; padding:1px 5px; border-radius:3px; cursor:pointer; position:relative; }
.origin-badge.user_initiated { background:rgba(63,185,80,.12); color:var(--green); }
.origin-badge.user_confirmed { background:rgba(63,185,80,.08); color:var(--green); opacity:.8; }
.origin-badge.user_implicit { background:rgba(88,166,255,.1); color:var(--accent); }
.origin-badge.agent_pending { background:rgba(209,134,22,.15); color:var(--orange); }
.origin-badge.agent_ignored { background:rgba(139,148,158,.12); color:var(--text-dim); }
.origin-popover { display:none; position:absolute; z-index:50; top:100%; left:0; margin-top:4px; background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:8px 10px; min-width:280px; max-width:520px; box-shadow:0 4px 12px rgba(0,0,0,.4); font-size:11px; line-height:1.5; color:var(--text); white-space:pre-wrap; word-wrap:break-word; text-align:left; }
.origin-popover.open { display:block; }
.origin-popover .pop-title { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:4px; }
.task-category { font-size:9px; padding:1px 5px; border-radius:3px; background:rgba(188,140,255,.1); color:var(--purple); }
.task-id { font-size:11px; color:var(--text-dim); margin-top:4px; flex-shrink:0; }

/* Expand area */
.task-expand { max-height:0; overflow:hidden; transition:max-height .3s ease; }
.task-card.expanded .task-expand { max-height:2000px; }

/* Subtasks */
.subtask-list { margin-top:8px; display:flex; flex-direction:column; gap:2px; }
.subtask-item { display:flex; align-items:flex-start; gap:8px; padding:6px 8px; border-radius:4px; cursor:pointer; margin-left:4px; border-left:2px solid var(--border); transition:.1s; }
.subtask-item:hover { background:rgba(255,255,255,.03); border-left-color:var(--text-dim); }
.subtask-item .task-status { width:8px; height:8px; margin-top:4px; flex-shrink:0; }
.subtask-body { flex:1; min-width:0; }
.subtask-title { color:var(--text); font-size:12px; }
.subtask-meta { font-size:10px; color:var(--text-dim); margin-top:1px; }
.subtask-notes { font-size:11px; color:var(--text-dim); white-space:pre-wrap; margin-top:4px; padding:4px 0; max-height:0; overflow:hidden; transition:max-height .2s; }
.subtask-item.sub-expanded .subtask-notes { max-height:500px; }
.subtask-toggle { font-size:10px; color:var(--accent); cursor:pointer; margin-left:4px; }
.subtask-toggle:hover { text-decoration:underline; }

/* Notes toggle */
.notes-section { margin-top:8px; border-top:1px solid var(--border); padding-top:6px; }
.notes-toggle { font-size:11px; color:var(--text-dim); cursor:pointer; display:flex; align-items:center; gap:4px; }
.notes-toggle:hover { color:var(--text); }
.notes-toggle .chevron { transition:transform .15s; font-size:9px; }
.notes-toggle.open .chevron { transform:rotate(90deg); }
.notes-content { font-size:11px; color:var(--text-dim); white-space:pre-wrap; max-height:0; overflow:hidden; transition:max-height .2s; margin-top:4px; }
.notes-toggle.open + .notes-content { max-height:500px; }

/* Section headers */
.section { margin-bottom:20px; }
.section-header { font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; }
.section-count { font-size:11px; }

/* Empty */
.empty { text-align:center; padding:60px 20px; color:var(--text-dim); }
.empty h2 { font-size:16px; margin-bottom:8px; color:var(--text); }

/* Search */
.search { padding:8px 16px; border-bottom:1px solid var(--border); }
.search input { width:100%; padding:5px 8px; border-radius:4px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:12px; outline:none; }
.search input:focus { border-color:var(--accent); }

/* Settings gear */
.header-row { display:flex; align-items:center; justify-content:space-between; padding-right:12px; }
.gear-btn { background:none; border:none; color:var(--text-dim); cursor:pointer; font-size:15px; padding:4px; border-radius:4px; }
.gear-btn:hover { color:var(--text); background:rgba(255,255,255,.06); }

/* Settings Modal */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:10px; width:520px; max-height:80vh; overflow-y:auto; }
.modal-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.modal-header h2 { font-size:15px; }
.modal-close { background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; padding:4px 8px; border-radius:4px; }
.modal-close:hover { color:var(--text); background:rgba(255,255,255,.06); }
.modal-body { padding:16px 20px; }
.modal-footer { padding:12px 20px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px; align-items:center; }

.settings-section { margin-bottom:16px; }
.settings-section h3 { font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
.setting-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.setting-label { font-size:12px; color:var(--text); }
.setting-hint { font-size:10px; color:var(--text-dim); margin-top:1px; }
.setting-input { width:160px; }
.setting-input input, .setting-input select {
  width:100%; padding:4px 8px; border-radius:4px; border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:12px; outline:none;
}
.setting-input input:focus { border-color:var(--accent); }

.btn { padding:5px 14px; border-radius:5px; font-size:12px; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); }
.btn:hover { border-color:var(--text-dim); }
.btn-primary { background:var(--accent); border-color:var(--accent); color:#fff; }
.btn-primary:hover { opacity:.9; }
.btn-danger { color:var(--red); }
.btn-danger:hover { background:rgba(248,81,73,.1); }
.save-status { font-size:11px; color:var(--green); }
.save-status.error { color:var(--red); }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="header-row">
      <h1><span>&#x1f4cb;</span> Task Tracker</h1>
      <button class="gear-btn" onclick="openSettings()" title="Settings">&#9881;</button>
    </div>
    <div class="stats" id="stats"></div>
    <div class="search"><input type="text" id="search" placeholder="Search tasks..."></div>
    <div class="filters">
      <div class="filter-group">
        <label>Project</label>
        <select id="project-filter"><option value="">All projects</option></select>
      </div>
      <div class="filter-group">
        <label>Status</label>
        <div class="filter-pills" id="status-pills"></div>
      </div>
      <div class="filter-group">
        <label>Tag</label>
        <select id="tag-filter"><option value="">All tags</option></select>
      </div>
      <div class="filter-group">
        <label>Priority</label>
        <div class="filter-pills" id="priority-pills"></div>
      </div>
      <div class="filter-group">
        <label>Origin</label>
        <select id="origin-filter"><option value="">All origins</option></select>
      </div>
      <div class="filter-group">
        <label>Category</label>
        <select id="category-filter"><option value="">All categories</option></select>
      </div>
    </div>
    <div class="activity-list" id="activity"></div>
  </div>
  <div class="main" id="main"></div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" onclick="closeSettings()">&times;</button>
    </div>
    <div class="modal-body" id="settings-body"></div>
    <div class="modal-footer">
      <span class="save-status" id="save-status"></span>
      <button class="btn" onclick="resetDefaults()">Reset Defaults</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
const API = `http://${location.host}`;
let allTasks = [], allLinks = [], activeStatuses = new Set(['open','in_progress','blocked']), activePriorities = new Set(), activeTag = '', activeProject = '', activeOrigin = '', activeCategory = '', searchQuery = '';
const ORIGIN_LABELS = { user_initiated:'requested', user_confirmed:'confirmed', user_implicit:'implicit', agent_pending:'pending', agent_ignored:'ignored' };
let currentConfig = {}, defaultConfig = {};

async function load() {
  try {
    const r = await fetch(`${API}/api/tasks`);
    const d = await r.json();
    allTasks = d.tasks || [];
    allLinks = d.sessionLinks || [];
  } catch(e) { console.error(e); }
  renderAll();
}

function renderAll() {
  renderStats();
  renderStatusPills();
  renderPriorityPills();
  renderProjectFilter();
  renderTagFilter();
  renderOriginFilter();
  renderCategoryFilter();
  renderTasks();
  renderActivity();
}

function renderStats() {
  const done = allTasks.filter(t => t.status === 'done').length;
  const active = allTasks.length - done;
  document.getElementById('stats').textContent = `${allTasks.length} tasks \u00b7 ${active} active \u00b7 ${done} done`;
}

function getFilteredExcludingStatus() {
  // Filter by everything EXCEPT status, so pills show counts for available tasks
  return allTasks.filter(t => {
    if (activePriorities.size && !activePriorities.has(t.priority)) return false;
    if (activeProject && !getProjectLinkedIds(activeProject).has(t.id)) return false;
    if (activeTag && !(t.tags||[]).some(tag => tag.toLowerCase() === activeTag.toLowerCase())) return false;
    if (activeOrigin && t.origin !== activeOrigin) return false;
    if (activeCategory && t.category !== activeCategory) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return t.title.toLowerCase().includes(q) || (t.notes||'').toLowerCase().includes(q) || (t.tags||[]).some(tag => tag.toLowerCase().includes(q));
    }
    return true;
  });
}

function renderStatusPills() {
  const relevantTasks = getFilteredExcludingStatus();
  const counts = {};
  for (const t of relevantTasks) counts[t.status] = (counts[t.status]||0) + 1;
  const statuses = ['open','in_progress','blocked','done'];
  const labels = { open:'Open', in_progress:'In Progress', blocked:'Blocked', done:'Done' };
  const el = document.getElementById('status-pills');
  el.innerHTML = statuses.map(s =>
    `<span class="pill ${activeStatuses.has(s)?'active':''}" data-status="${s}">${labels[s]}<span class="count">${counts[s]||0}</span></span>`
  ).join('');
  el.querySelectorAll('.pill').forEach(p => p.onclick = () => {
    const s = p.dataset.status;
    activeStatuses.has(s) ? activeStatuses.delete(s) : activeStatuses.add(s);
    renderAll();
  });
}

function renderPriorityPills() {
  const el = document.getElementById('priority-pills');
  const prios = ['high','normal','low'];
  const labels = { high:'High', normal:'Normal', low:'Low' };
  el.innerHTML = prios.map(p =>
    `<span class="pill ${activePriorities.size===0||activePriorities.has(p)?'active':''}" data-prio="${p}">${labels[p]}</span>`
  ).join('');
  el.querySelectorAll('.pill').forEach(p => p.onclick = () => {
    const v = p.dataset.prio;
    if (activePriorities.has(v)) { activePriorities.delete(v); }
    else { activePriorities.add(v); }
    if (activePriorities.size === 3) activePriorities.clear();
    renderAll();
  });
}

function renderProjectFilter() {
  const projects = new Set();
  for (const l of allLinks) if (l.project) {
    const parts = l.project.split('/');
    const folder = parts[parts.length-1] || parts[parts.length-2];
    if (folder) projects.add(folder);
  }
  const sel = document.getElementById('project-filter');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All projects</option>' + [...projects].sort().map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
  sel.value = prev || '';
  sel.onchange = () => { activeProject = sel.value; renderAll(); };
}

function renderTagFilter() {
  const tags = new Set();
  for (const t of allTasks) for (const tag of (t.tags||[])) tags.add(tag);
  const sel = document.getElementById('tag-filter');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All tags</option>' + [...tags].sort().map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
  sel.value = prev || '';
  sel.onchange = () => { activeTag = sel.value; renderAll(); };
}

function renderOriginFilter() {
  const origins = new Set();
  for (const t of allTasks) if (t.origin) origins.add(t.origin);
  const sel = document.getElementById('origin-filter');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All origins</option>' + [...origins].sort().map(o => `<option value="${esc(o)}">${ORIGIN_LABELS[o]||o}</option>`).join('');
  sel.value = prev || '';
  sel.onchange = () => { activeOrigin = sel.value; renderAll(); };
}

function renderCategoryFilter() {
  const cats = new Set();
  for (const t of allTasks) if (t.category) cats.add(t.category);
  const sel = document.getElementById('category-filter');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All categories</option>' + [...cats].sort().map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  sel.value = prev || '';
  sel.onchange = () => { activeCategory = sel.value; renderAll(); };
}

function getFamily(taskId) {
  // Returns all IDs in a task's hierarchy (ancestors + descendants)
  const ids = new Set([taskId]);
  // Walk up
  let cur = allTasks.find(t => t.id === taskId);
  while (cur?.parentId) {
    ids.add(cur.parentId);
    cur = allTasks.find(t => t.id === cur.parentId);
  }
  // Walk down
  function addChildren(pid) {
    for (const c of allTasks.filter(t => t.parentId === pid)) {
      ids.add(c.id);
      addChildren(c.id);
    }
  }
  addChildren(taskId);
  return ids;
}

// Cache project-linked task families (rebuilt each load)
let _projectFamilyCache = null;
function getProjectLinkedIds(project) {
  if (!_projectFamilyCache) _projectFamilyCache = {};
  if (_projectFamilyCache[project]) return _projectFamilyCache[project];
  const directIds = new Set(allLinks.filter(l => l.project && l.project.toLowerCase().includes(project.toLowerCase())).map(l => l.taskId));
  const familyIds = new Set();
  for (const id of directIds) for (const fid of getFamily(id)) familyIds.add(fid);
  _projectFamilyCache[project] = familyIds;
  return familyIds;
}

function filterTasks() {
  _projectFamilyCache = null;
  return allTasks.filter(t => {
    if (!activeStatuses.has(t.status)) return false;
    if (activePriorities.size && !activePriorities.has(t.priority)) return false;
    if (activeProject && !getProjectLinkedIds(activeProject).has(t.id)) return false;
    if (activeTag && !(t.tags||[]).some(tag => tag.toLowerCase() === activeTag.toLowerCase())) return false;
    if (activeOrigin && t.origin !== activeOrigin) return false;
    if (activeCategory && t.category !== activeCategory) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return t.title.toLowerCase().includes(q) || (t.notes||'').toLowerCase().includes(q) || (t.tags||[]).some(tag => tag.toLowerCase().includes(q));
    }
    return true;
  });
}

function getSubtasks(parentId) {
  return allTasks.filter(t => t.parentId === parentId);
}

function renderSubtaskList(parentId) {
  const subs = getSubtasks(parentId);
  if (!subs.length) return '';
  const sorted = subs.sort((a,b) => (a.status==='done'?1:0)-(b.status==='done'?1:0) || (b.updatedAt||'').localeCompare(a.updatedAt||''));
  let html = '<div class="subtask-list">';
  for (const s of sorted) {
    const sDate = (s.updatedAt||s.createdAt||'').slice(0,10);
    const sNotes = (s.notes||'').trim();
    const grandSubs = getSubtasks(s.id);
    const grandDone = grandSubs.filter(g => g.status === 'done').length;
    const grandLabel = grandSubs.length ? ` <span class="subtask-toggle">${grandDone === grandSubs.length ? '\u2713 ' : ''}${grandDone} of ${grandSubs.length} done</span>` : '';
    html += `<div class="subtask-item" data-task-id="${s.id}" onclick="event.stopPropagation();this.classList.toggle('sub-expanded')">
      <div class="task-status status-${s.status}"></div>
      <div class="subtask-body">
        <div class="subtask-title">${esc(s.title)}${grandLabel}</div>
        <div class="subtask-meta">#${s.id} &middot; ${sDate}${ORIGIN_LABELS[s.origin]?' &middot; '+makeOriginBadge(s.origin, ORIGIN_LABELS[s.origin], s.originReason):''}${s.category?' &middot; <span class="task-category">'+esc(s.category)+'</span>':''}${s.priority==='high'?' &middot; <span class="priority-high">high</span>':''}</div>
        ${s.context ? `<div style="font-size:10px;color:var(--text-dim);margin-top:2px">${esc(s.context)}</div>` : ''}
        ${sNotes ? `<div class="subtask-notes">${esc(sNotes)}</div>` : ''}
        ${renderSubtaskList(s.id)}
      </div>
    </div>`;
  }
  html += '</div>';
  return html;
}

function renderTaskCard(t) {
  const tags = (t.tags||[]).map(tag => `<span class="tag" onclick="event.stopPropagation();document.getElementById('tag-filter').value='${esc(tag)}';activeTag='${esc(tag)}';renderAll()">${esc(tag)}</span>`).join('');
  const prioClass = t.priority === 'high' ? 'priority-high' : t.priority === 'low' ? 'priority-low' : '';
  const isAgent = (t.origin||'').startsWith('agent');
  const originLabel = ORIGIN_LABELS[t.origin] || t.origin || '';
  const originBadge = originLabel ? makeOriginBadge(t.origin, originLabel, t.originReason) : '';
  const categoryBadge = t.category ? `<span class="task-category">${esc(t.category)}</span>` : '';
  const date = (t.updatedAt||t.createdAt||'').slice(0,10);
  const notes = (t.notes||'').trim();
  const links = allLinks.filter(l => l.taskId === t.id);
  const cwds = [...new Set(links.map(l => l.project).filter(Boolean))];
  const cwdInfo = cwds.length ? cwds.map(c => { const p = c.split('/'); return p[p.length-1]||p[p.length-2]; }).join(', ') : '';
  const subtasks = getSubtasks(t.id);
  const subDone = subtasks.filter(s => s.status === 'done').length;
  const subTotal = subtasks.length;
  const subLabel = subTotal
    ? `<span class="subtask-toggle">${subDone === subTotal ? '\u2713 ' : ''}${subDone} of ${subTotal} done</span>`
    : '';

  // Subtask list — each subtask expandable for its own notes, recursively
  const subtaskHtml = renderSubtaskList(t.id);

  // Notes in a collapsible section at the bottom
  let notesHtml = '';
  if (notes) {
    const noteId = 'notes-' + t.id;
    notesHtml = `<div class="notes-section">
      <div class="notes-toggle" onclick="event.stopPropagation();this.classList.toggle('open')">
        <span class="chevron">&#9654;</span> Notes
      </div>
      <div class="notes-content">${esc(notes)}</div>
    </div>`;
  }

  // Expand area: subtasks first, then notes
  const hasExpand = subtaskHtml || notesHtml;

  return `<div class="task-card${isAgent ? ' origin-agent' : ''}" data-task-id="${t.id}" onclick="this.classList.toggle('expanded')">
    <div class="task-status status-${t.status}"></div>
    <div class="task-body">
      <div class="task-title">${esc(t.title)} ${subLabel}</div>
      <div class="task-meta">
        ${originBadge}${categoryBadge}
        ${tags}
        ${cwdInfo ? `<span style="opacity:.5">${esc(cwdInfo)}</span>` : ''}
        <span class="${prioClass}">${t.priority||'normal'}</span>
        <span>${date}</span>
      </div>
      ${t.context ? `<div style="font-size:11px;color:var(--text-dim);margin-top:2px">${esc(t.context)}</div>` : ''}
      ${hasExpand ? `<div class="task-expand">${subtaskHtml}${notesHtml}</div>` : ''}
    </div>
    <div class="task-id">#${t.id}</div>
  </div>`;
}

function saveExpandState() {
  const state = { cards: new Set(), subs: new Set(), notes: new Set() };
  document.querySelectorAll('.task-card.expanded').forEach(el => { if (el.dataset.taskId) state.cards.add(el.dataset.taskId); });
  document.querySelectorAll('.subtask-item.sub-expanded').forEach(el => { if (el.dataset.taskId) state.subs.add(el.dataset.taskId); });
  document.querySelectorAll('.notes-toggle.open').forEach(el => { const card = el.closest('[data-task-id]'); if (card) state.notes.add(card.dataset.taskId); });
  return state;
}

function restoreExpandState(state) {
  state.cards.forEach(id => { const el = document.querySelector(`.task-card[data-task-id="${id}"]`); if (el) el.classList.add('expanded'); });
  state.subs.forEach(id => { const el = document.querySelector(`.subtask-item[data-task-id="${id}"]`); if (el) el.classList.add('sub-expanded'); });
  state.notes.forEach(id => { const el = document.querySelector(`[data-task-id="${id}"] .notes-toggle`); if (el) el.classList.add('open'); });
}

function renderTasks() {
  const filtered = filterTasks();
  const main = document.getElementById('main');
  const expandState = saveExpandState();

  // Root tasks only — subtasks render inside their parent card
  // Walk up to find the true root for any matched subtask
  function findRoot(t) {
    let cur = t;
    const seen = new Set();
    while (cur.parentId && !seen.has(cur.parentId)) {
      seen.add(cur.parentId);
      const p = allTasks.find(x => x.id === cur.parentId);
      if (!p) break;
      cur = p;
    }
    return cur;
  }
  const rootSet = new Map();
  for (const t of filtered) {
    const root = findRoot(t);
    if (!rootSet.has(root.id)) rootSet.set(root.id, root);
  }
  const rootTasks = [...rootSet.values()];

  if (!rootTasks.length) {
    main.innerHTML = `<div class="empty"><h2>No tasks match</h2><p>Adjust filters or wait for the tracker to observe your sessions.</p></div>`;
    return;
  }

  const groups = [
    ['in_progress', 'In Progress'],
    ['open', 'Open'],
    ['blocked', 'Blocked'],
    ['done', 'Completed'],
  ];

  let html = '';
  for (const [status, label] of groups) {
    const tasks = rootTasks.filter(t => t.status === status);
    if (!tasks.length) continue;
    html += `<div class="section"><div class="section-header"><span>${label}</span><span class="section-count">${tasks.length}</span></div><div class="task-grid">`;
    for (const t of tasks.sort((a,b) => (b.updatedAt||'').localeCompare(a.updatedAt||''))) {
      html += renderTaskCard(t);
    }
    html += '</div></div>';
  }
  main.innerHTML = html;
  restoreExpandState(expandState);
}

function renderActivity() {
  const el = document.getElementById('activity');
  const recent = allLinks.slice(-30).reverse();
  if (!recent.length) { el.innerHTML = '<div style="padding:16px;color:var(--text-dim);font-size:11px">No activity yet</div>'; return; }

  el.innerHTML = recent.map(l => {
    const task = allTasks.find(t => t.id === l.taskId);
    const time = (l.createdAt||'').slice(11,16);
    const date = (l.createdAt||'').slice(5,10);
    const roleClass = `role-${l.role}`;
    return `<div class="activity-item">
      <span class="time">${date} ${time}</span>
      <span class="role ${roleClass}">${l.role}</span>
      #${l.taskId} ${esc(task?.title||'?')}
    </div>`;
  }).join('');
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function makeOriginBadge(origin, label, reason) {
  const reasonText = (reason || '').trim();
  const hasHistory = reasonText.includes('\u2192');
  const popTitle = hasHistory ? 'Origin history' : 'Origin reason';
  const popBody = reasonText || '(no reason recorded)';
  return `<span class="origin-badge ${esc(origin)}" onclick="event.stopPropagation();toggleOriginPopover(this)">
    ${label}
    <span class="origin-popover"><div class="pop-title">${popTitle}</div>${esc(popBody)}</span>
  </span>`;
}

function toggleOriginPopover(badge) {
  const pop = badge.querySelector('.origin-popover');
  const isOpen = pop.classList.contains('open');
  document.querySelectorAll('.origin-popover.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) pop.classList.add('open');
}

// Close popovers when clicking elsewhere
document.addEventListener('click', (e) => {
  if (!e.target.closest('.origin-badge')) {
    document.querySelectorAll('.origin-popover.open').forEach(p => p.classList.remove('open'));
  }
});

// ── Settings ──

const SETTINGS_SCHEMA = [
  { section: 'Worker', fields: [
    { key: 'port', label: 'Port', hint: 'Restart required after change', type: 'number', min: 1024, max: 65535 },
    { key: 'host', label: 'Bind Address', hint: '0.0.0.0 for LAN, 127.0.0.1 for local only', type: 'text' },
  ]},
  { section: 'AI Model', fields: [
    { key: 'model', label: 'Model', hint: 'Claude model for analysis', type: 'select', options: ['haiku','sonnet','opus'] },
    { key: 'analysisTimeout', label: 'Timeout (ms)', hint: 'Max wait for AI response', type: 'number', min: 5000, max: 120000 },
    { key: 'maxTurns', label: 'Max Turns', type: 'number', min: 1, max: 5 },
    { key: 'language', label: 'Language', hint: 'auto = match conversation language', type: 'select', options: ['auto','English','Chinese','Japanese','Korean','Spanish','French','German','Portuguese','Russian'] },
  ]},
  { section: 'Analysis Thresholds', fields: [
    { key: 'minDeltaChars', label: 'Min Delta (chars)', hint: 'Skip analysis if conversation delta is shorter', type: 'number', min: 0 },
    { key: 'minSummaryChars', label: 'Min Summary (chars)', hint: 'Skip if summary too short', type: 'number', min: 0 },
    { key: 'maxPromptChars', label: 'Max Prompt (chars)', hint: 'Truncate conversation in prompt', type: 'number', min: 1000 },
    { key: 'maxSummaryChars', label: 'Max Summary (chars)', hint: 'Truncate message summarization', type: 'number', min: 1000 },
  ]},
  { section: 'Display', fields: [
    { key: 'recentLinksLimit', label: 'Recent Links', hint: 'Session links returned by API', type: 'number', min: 10, max: 500 },
    { key: 'recentSessionsLimit', label: 'Recent Sessions', hint: 'Sessions shown in TASKS.md', type: 'number', min: 5, max: 50 },
    { key: 'recentCompletedLimit', label: 'Completed Tasks', hint: 'Done tasks shown in TASKS.md', type: 'number', min: 5, max: 100 },
    { key: 'autoRefreshInterval', label: 'Auto-refresh (ms)', hint: 'Dashboard refresh interval', type: 'number', min: 5000, max: 300000 },
  ]},
];

async function loadSettings() {
  try {
    const r = await fetch(`${API}/api/config`);
    const d = await r.json();
    currentConfig = d.config || {};
    defaultConfig = d.defaults || {};
  } catch(e) { console.error(e); }
}

function openSettings() {
  loadSettings().then(() => {
    renderSettings();
    document.getElementById('settings-modal').classList.add('open');
    document.getElementById('save-status').textContent = '';
  });
}

function closeSettings() {
  document.getElementById('settings-modal').classList.remove('open');
}

function renderSettings() {
  const body = document.getElementById('settings-body');
  let html = '';
  for (const section of SETTINGS_SCHEMA) {
    html += `<div class="settings-section"><h3>${section.section}</h3>`;
    for (const f of section.fields) {
      const val = currentConfig[f.key] ?? defaultConfig[f.key] ?? '';
      html += `<div class="setting-row">
        <div>
          <div class="setting-label">${f.label}</div>
          ${f.hint ? `<div class="setting-hint">${f.hint}</div>` : ''}
        </div>
        <div class="setting-input">`;
      if (f.type === 'select') {
        html += `<select data-key="${f.key}">${f.options.map(o => `<option value="${o}" ${val===o?'selected':''}>${o}</option>`).join('')}</select>`;
      } else {
        html += `<input type="${f.type}" data-key="${f.key}" value="${esc(String(val))}" ${f.min!==undefined?`min="${f.min}"`:''} ${f.max!==undefined?`max="${f.max}"`:''}>`;
      }
      html += `</div></div>`;
    }
    html += '</div>';
  }
  body.innerHTML = html;
}

async function saveSettings() {
  const updates = {};
  document.querySelectorAll('[data-key]').forEach(el => {
    const key = el.dataset.key;
    let val = el.value;
    if (el.type === 'number') val = Number(val);
    if (val !== (defaultConfig[key] ?? '')) updates[key] = val;
    else updates[key] = val; // send all values
  });
  try {
    const r = await fetch(`${API}/api/config`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates),
    });
    const d = await r.json();
    if (r.ok) {
      currentConfig = d.config;
      const status = document.getElementById('save-status');
      status.textContent = '\u2713 Saved';
      status.className = 'save-status';
      // Update refresh interval if changed
      if (updates.autoRefreshInterval) {
        clearInterval(refreshTimer);
        refreshTimer = setInterval(load, updates.autoRefreshInterval);
      }
    } else {
      const status = document.getElementById('save-status');
      status.textContent = '\u2717 ' + (d.error || 'Save failed');
      status.className = 'save-status error';
    }
  } catch(e) {
    const status = document.getElementById('save-status');
    status.textContent = '\u2717 Connection error';
    status.className = 'save-status error';
  }
}

function resetDefaults() {
  currentConfig = { ...defaultConfig };
  renderSettings();
  document.getElementById('save-status').textContent = 'Defaults loaded \u2014 click Save to apply';
}

// Click outside modal to close
document.getElementById('settings-modal').onclick = (e) => {
  if (e.target.id === 'settings-modal') closeSettings();
};

// Search
document.getElementById('search').addEventListener('input', e => { searchQuery = e.target.value; renderTasks(); });

// Auto-refresh
load();
let refreshTimer = setInterval(load, 15000);
</script>
